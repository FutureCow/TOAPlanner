# TOA Planner — multi-tenant Nginx configuratie
# Alle subdomeinen van toaplanner.nl worden doorgestuurd naar één Next.js app.
# Elke school krijgt een eigen subdomein: schoola.toaplanner.nl

# HTTP → HTTPS
server {
    listen 80;
    server_name *.toaplanner.nl toaplanner.nl;
    return 301 https://$host$request_uri;
}

# HTTPS — wildcard certificaat vereist (bijv. via Certbot DNS challenge)
server {
    listen 443 ssl;
    server_name *.toaplanner.nl toaplanner.nl;

    ssl_certificate     /etc/letsencrypt/live/toaplanner.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toaplanner.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
