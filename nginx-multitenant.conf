# TOA Planner — multi-tenant Nginx configuratie
# - toaplanner.nl          → promotiepagina (statische HTML uit /opt/toa-planner/promo/)
# - *.toaplanner.nl        → Next.js app (school per subdomein)

# HTTP → HTTPS
server {
    listen 80;
    server_name toaplanner.nl *.toaplanner.nl;
    return 301 https://$host$request_uri;
}

# HTTPS — promotiepagina op hoofddomein
server {
    listen 443 ssl;
    server_name toaplanner.nl;

    ssl_certificate     /etc/letsencrypt/live/toaplanner.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toaplanner.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /opt/toa-planner/promo;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

# HTTPS — Next.js app op subdomeinen (*.toaplanner.nl)
server {
    listen 443 ssl;
    server_name *.toaplanner.nl;

    ssl_certificate     /etc/letsencrypt/live/toaplanner.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toaplanner.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
