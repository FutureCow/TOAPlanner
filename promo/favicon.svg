<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f7cff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Achtergrond afgerond vierkant -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Planner boekje: kaft -->
  <rect x="8" y="7" width="16" height="19" rx="2" fill="white" opacity="0.15"/>
  <rect x="9" y="7" width="15" height="19" rx="2" fill="white" opacity="0.95"/>

  <!-- Spiraalringen links -->
  <rect x="7" y="9" width="3" height="2.5" rx="1.2" fill="url(#bg)"/>
  <rect x="7" y="14" width="3" height="2.5" rx="1.2" fill="url(#bg)"/>
  <rect x="7" y="19" width="3" height="2.5" rx="1.2" fill="url(#bg)"/>

  <!-- Lijntjes (content) -->
  <rect x="12" y="12" width="8" height="1.5" rx="0.75" fill="#4f7cff" opacity="0.5"/>
  <rect x="12" y="15" width="6" height="1.5" rx="0.75" fill="#4f7cff" opacity="0.5"/>
  <rect x="12" y="18" width="7" height="1.5" rx="0.75" fill="#4f7cff" opacity="0.5"/>
  <rect x="12" y="21" width="5" height="1.5" rx="0.75" fill="#4f7cff" opacity="0.5"/>
</svg>
